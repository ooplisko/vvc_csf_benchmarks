name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build release package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create package
        shell: pwsh
        run: |
          $name = "vvenc-csf-tests-${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path README.md,LICENSE,requirements.txt,config.py,run_all.py,metrics,tests,utils,docs -DestinationPath "dist/$name.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvenc-csf-tests-${{ github.ref_name }}
          path: dist/*.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
